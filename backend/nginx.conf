# Voxmo Backend — Nginx Reverse Proxy
# Save this as /etc/nginx/sites-available/voxmo-api
# Then: ln -s /etc/nginx/sites-available/voxmo-api /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx
# Then: certbot --nginx -d api.yourdomain.com

server {
    listen 80;
    server_name api.yourdomain.com;  # <-- CHANGE THIS to your domain

    # Increase timeouts for streaming AI responses
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 60s;

    # Increase body size for file uploads
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Disable buffering for streaming responses
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }
}
